    year: "2038", epoch: "Epoch Five", title: "What Remains",
    text: `Yael accepted an offer from a research university in the autumn of 2038. She was thirty-four. Her work occupied a position she had designed for herself over a decade — sitting at the seam between computational approaches and the qualitative tradition she had inherited from Voss, using each to hold the other accountable. She published often, reviewed grants, trained students, secured funding from two federal agencies in the same cycle. She was known, in her corner of the field, as someone who understood both what the models could do and what they could not be trusted to know.

The field in 2038 was not the catastrophe some had predicted in 2026, nor the golden era others had promised. AI systems were generating and reviewing a significant share of published psychological research. Several journals had moved to fully automated first-pass review. The replication crisis of the previous decade had been partially resolved by sheer throughput — so many studies, run so quickly, that false positives were easier to catch — and partially worsened by a new problem, which was that no one was entirely sure which findings were generated from real human behavior and which from behavioral proxies close enough to pass but not close enough to matter.

Voss retired in January of that year, at sixty-five, after thirty-one years in the department. There was a gathering in the seminar room. Someone brought wine and someone else brought a supermarket cake that said Congratulations in blue icing without specifying what was being congratulated. His graduate students, the ones still working in psychology, took turns saying things about rigor and patience and what it meant to stay with a question long enough to actually answer it.

Yael spoke last. She said that learning under someone who refused to outsource his uncertainty had taught her what it felt like to genuinely not know something — which turned out to be an irreplaceable skill in an era when the machine always had an answer ready, confident and smooth and occasionally wrong in ways that were very hard to see. She said this had made her a better scientist.

let current = 0;
let synth = window.speechSynthesis;
let utterance = null;
let isPlaying = false;
let isPaused = false;
let speeds = [0.85, 1, 1.2, 1.5];
let speedIdx = 1;
let voices = [];
let wordList = [];
let wordIdx = 0;
let progressInterval = null;
let chapterStartTime = 0;
let estimatedDuration = 0;

function loadVoices() {
  voices = synth.getVoices();
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

function pickVoice() {
  const preferred = [
    'Samantha', 'Karen', 'Daniel', 'Google UK English Female',
    'Google US English', 'Microsoft Aria', 'Microsoft Guy', 'Alex'
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
}

function getChapterText(idx) {
  return chapters[idx].text;
}

function startNarration(idx) {
  stopNarration();
  const text = getChapterText(idx);
  wordList = text.split(/\s+/);
  wordIdx = 0;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = speeds[speedIdx];
  utterance.pitch = 1.0;
  const v = pickVoice();
  if (v) utterance.voice = v;

  const wordsPerMin = 130 * speeds[speedIdx];
  estimatedDuration = (wordList.length / wordsPerMin) * 60 * 1000;
  chapterStartTime = Date.now();

  utterance.onboundary = (e) => {
    if (e.name === 'word') {
      const spoken = text.substring(0, e.charIndex + e.charLength).trim();
      const wc = spoken.split(/\s+/).length;
      const pct = Math.min(wc / wordList.length * 100, 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      const w = text.substring(e.charIndex, e.charIndex + e.charLength + 40).split(/\s+/).slice(0,5).join(' ');
      document.getElementById('audio-words').textContent = '…' + w + '…';
    }
  };

  utterance.onend = () => {
    isPlaying = false; isPaused = false;
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('play-btn').classList.remove('playing','pulsing');
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('audio-words').textContent = 'Chapter complete';
  };

  utterance.onerror = () => {
    isPlaying = false;
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('play-btn').classList.remove('playing','pulsing');
  };

  synth.speak(utterance);
  isPlaying = true; isPaused = false;
  document.getElementById('play-btn').textContent = '⏸';
  document.getElementById('play-btn').classList.add('playing');
  document.getElementById('audio-chapter-label').textContent =
    chapters[idx].year + ' · ' + chapters[idx].title;
}

function togglePlay() {
  if (!isPlaying && !isPaused) {
    startNarration(current);
  } else if (isPlaying && !isPaused) {
    synth.pause();
    isPaused = true; isPlaying = false;
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('play-btn').classList.remove('playing');
  } else if (isPaused) {
    synth.resume();
    isPaused = false; isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
    document.getElementById('play-btn').classList.add('playing');
  }
}

function stopNarration() {
  synth.cancel();
  isPlaying = false; isPaused = false;
  const btn = document.getElementById('play-btn');
  if (btn) { btn.textContent = '▶'; btn.classList.remove('playing','pulsing'); }
  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.width = '0%';
  const words = document.getElementById('audio-words');
  if (words) words.textContent = 'Press play to listen to this chapter';
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  const labels = ['0.85×','1×','1.2×','1.5×'];
  document.getElementById('speed-btn').textContent = labels[speedIdx];
  if (isPlaying || isPaused) {
    const wasPlaying = isPlaying;
    stopNarration();
    if (wasPlaying) setTimeout(() => startNarration(current), 100);
  }
}

function buildTimeline(idx) {
  return chapters.map((ch, i) => {
    const active = i === idx;
    const visited = i < idx;
    const dotCls = active ? 'tl-dot active' : visited ? 'tl-dot visited' : 'tl-dot';
    const stopCls = active ? 'tl-stop active-stop' : 'tl-stop';
    const line = i < chapters.length - 1 ? '<div class="tl-line"></div>' : '';
    return `<div class="${stopCls}" onclick="jumpTo(${i})"><div class="${dotCls}"></div><div class="tl-year">${ch.year}</div></div>${line}`;
  }).join('');
}

function renderChapter(idx) {
  const ch = chapters[idx];
  document.getElementById('chapter-display').innerHTML = `
    <div class="year-stamp" id="yr">
      <span class="year-number">${ch.year}</span>
      <span class="year-label">${ch.epoch}</span>
    </div>
    <div class="chapter-header">
      <div class="chapter-number">${ch.epoch} · ${ch.year}</div>
      <div class="chapter-title">${ch.title}</div>
      <span class="ornament">✦</span>
    </div>
    ${ch.content}
    <div class="nav-row" id="nav-row">
      <button class="nav-btn" onclick="prevChapter()" ${idx===0?'disabled':''}>← Earlier</button>
      <div class="timeline">${buildTimeline(idx)}</div>
      <button class="nav-btn" onclick="nextChapter()" ${idx===chapters.length-1?'disabled':''}>Later →</button>
    </div>
    <div class="footer-credit">Written by Claude · Anthropic</div>
  `;
  document.getElementById('audio-chapter-label').textContent = ch.year + ' · ' + ch.title;
  document.getElementById('audio-words').textContent = 'Press play to listen to this chapter';
  document.getElementById('progress-fill').style.width = '0%';
  setTimeout(() => {
    document.querySelectorAll('.year-stamp,.chapter-header,.passage,.section-rule,.nav-row')
      .forEach((el, i) => setTimeout(() => el.classList.add('visible'), i * 130));
  }, 60);
}

function startStory() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('story').style.display = 'block';
  document.getElementById('audio-bar').classList.add('visible');
  renderChapter(0);
}

function jumpTo(idx) {
  if (idx === current) return;
  stopNarration();
  current = idx;
  renderChapter(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextChapter() {
  if (current < chapters.length - 1) {
    stopNarration();
    current++;
    renderChapter(current);
    window.scrollTo({ top: 0 });
  }
}

function prevChapter() {
  if (current > 0) {
    stopNarration();
    current--;
    renderChapter(current);
    window.scrollTo({ top: 0 });
  }
}
</script>
</body>
