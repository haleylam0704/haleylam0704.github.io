<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personality – Professor-Style Quiz (Q185–208)</title>
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: #ddd8d0;
      --text: #1a1816;
      --muted: #6b6560;
      --accent: #4a6fa5;
      --accent-dark: #345185;
      --accent-light: #e8eef6;
      --correct: #2d7a4f;
      --correct-bg: #e8f5ee;
      --wrong: #b33c3c;
      --wrong-bg: #faeaea;
      --warn: #8a6400;
      --warn-bg: #fff6d6;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent-dark);
    }
    .header p {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 4px;
    }

    /* ── Setup Screen ─────────────────────────────────────────────── */
    #setup-screen { animation: fadeIn 0.3s ease; }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .setup-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--accent-dark);
    }

    .toggle-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .toggle-btn {
      padding: 8px 16px;
      border: 2px solid var(--border);
      border-radius: 20px;
      background: var(--surface2);
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
      color: var(--text);
    }
    .toggle-btn.active {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent-dark);
    }

    .start-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 20px;
    }
    .start-btn:hover { background: var(--accent-dark); }

    /* ── Topic overview grid ─────────────────────────────────────── */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }
    .topic-item {
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .topic-item .ti-name { font-weight: 600; color: var(--accent-dark); }
    .topic-item .ti-src  { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
    .topic-item .ti-count { color: var(--muted); font-size: 0.78rem; }

    /* ── Quiz Screen ─────────────────────────────────────────────── */
    #quiz-screen { display: none; animation: fadeIn 0.3s ease; }

    .progress-bar-outer {
      background: var(--surface2);
      border-radius: 99px;
      height: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Question card */
    .q-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .q-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    /* Bloom's badge colours */
    .badge-bloom-comprehension { background: #dde8f8; color: #345185; }
    .badge-bloom-application   { background: #e8f0e0; color: #3a5a20; }
    .badge-bloom-analysis      { background: #f5e8d8; color: #7a4010; }
    .badge-bloom-synthesis     { background: #ede0f8; color: #5a2080; }

    .badge-source { background: var(--surface2); color: var(--muted); font-weight: 500; text-transform: none; letter-spacing: 0; }
    .badge-topic  { background: var(--warn-bg);   color: var(--warn);  font-weight: 500; text-transform: none; letter-spacing: 0; }

    .q-text {
      font-size: 1.08rem;
      font-weight: 500;
      line-height: 1.55;
      margin-bottom: 20px;
    }

    /* MCQ options */
    .options-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .option-btn {
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1.5;
      transition: all 0.15s;
      color: var(--text);
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .option-btn.correct {
      border-color: var(--correct);
      background: var(--correct-bg);
      color: var(--correct);
      font-weight: 600;
    }
    .option-btn.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
      color: var(--wrong);
    }
    .option-btn.reveal-correct {
      border-color: var(--correct);
      background: var(--correct-bg);
    }
    .option-btn:disabled { cursor: default; }

    /* Feedback box */
    .feedback-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 0.93rem;
      line-height: 1.6;
      display: none;
    }
    .feedback-box.correct-fb { background: var(--correct-bg); border-left: 4px solid var(--correct); }
    .feedback-box.wrong-fb   { background: var(--wrong-bg);   border-left: 4px solid var(--wrong);   }
    .feedback-box strong { display: block; margin-bottom: 4px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Nav buttons */
    .nav-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .nav-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .next-btn { background: var(--accent); color: #fff; }
    .next-btn:hover { background: var(--accent-dark); }
    .next-btn:disabled { background: #b0b0b0; cursor: not-allowed; }
    .end-btn { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .end-btn:hover { background: var(--border); }

    /* ── Results Screen ────────────────────────────────────────────── */
    #results-screen { display: none; animation: fadeIn 0.3s ease; }

    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .score-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--accent-light);
      border: 4px solid var(--accent);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .score-circle.good  { border-color: var(--correct); background: var(--correct-bg); }
    .score-circle.good .score-pct { color: var(--correct); }
    .score-circle.ok    { border-color: #c89b00; background: var(--warn-bg); }
    .score-circle.ok .score-pct   { color: var(--warn); }
    .score-circle.poor  { border-color: var(--wrong); background: var(--wrong-bg); }
    .score-circle.poor .score-pct { color: var(--wrong); }

    .score-pct   { font-size: 2rem; font-weight: 800; color: var(--accent-dark); line-height: 1; }
    .score-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .score-breakdown {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .score-stat { font-size: 0.9rem; color: var(--muted); }
    .score-stat strong { color: var(--text); }

    .missed-section h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--wrong);
      margin-bottom: 12px;
    }
    .missed-item {
      background: var(--wrong-bg);
      border-left: 3px solid var(--wrong);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 0.88rem;
      text-align: left;
      line-height: 1.5;
    }
    .missed-item .mi-source { font-size: 0.78rem; color: var(--wrong); margin-bottom: 3px; font-weight: 600; }

    .results-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .results-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-retry-missed { background: var(--wrong); color: #fff; border: none; }
    .btn-retry-missed:hover { background: #8a2a2a; }
    .btn-retry-missed:disabled { background: #b0b0b0; cursor: not-allowed; }
    .btn-new-session { background: var(--accent); color: #fff; border: none; }
    .btn-new-session:hover { background: var(--accent-dark); }

    /* ── kbd hint ────────────────────────────────────────────────── */
    kbd {
      display: inline-block;
      padding: 1px 5px;
      font-size: 0.78rem;
      font-family: monospace;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--muted);
    }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .q-text { font-size: 1rem; }
      .setup-card { padding: 16px; }
      .q-card { padding: 18px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <div class="header">
    <h1>Personality Psychology</h1>
    <p>Professor-Style Quiz &mdash; Questions 185–208 &mdash; 24 Questions</p>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       SETUP SCREEN
  ══════════════════════════════════════════════════════════════ -->
  <div id="setup-screen">

    <div class="setup-card">
      <h2>Quiz Options</h2>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-shuffle-q" onclick="toggleOpt('shuffleQ')">Shuffle questions</button>
        <button class="toggle-btn active" id="btn-shuffle-a" onclick="toggleOpt('shuffleA')">Shuffle answers</button>
      </div>
    </div>

    <div class="setup-card">
      <h2>Topics covered in this quiz</h2>
      <div class="topic-grid" id="topic-overview"></div>
    </div>

    <button class="start-btn" onclick="startQuiz()">Start Quiz (24 questions)</button>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       QUIZ SCREEN
  ══════════════════════════════════════════════════════════════ -->
  <div id="quiz-screen">

    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>
    <div class="progress-meta">
      <span id="progress-text">Question 1 of 24</span>
      <span id="score-text">Score: 0 / 0</span>
    </div>

    <div class="q-card">
      <div class="q-meta" id="q-meta"></div>
      <div class="q-text" id="q-text"></div>
      <ul class="options-list" id="options-list"></ul>
      <div class="feedback-box" id="feedback-box"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn next-btn" id="next-btn" onclick="nextQuestion()" disabled>
        Next &rarr; <kbd>Enter</kbd>
      </button>
      <button class="nav-btn end-btn" onclick="finishEarly()">End &amp; See Results</button>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════════════════
       RESULTS SCREEN
  ══════════════════════════════════════════════════════════════ -->
  <div id="results-screen">

    <div class="results-card">
      <div class="score-circle" id="score-circle">
        <span class="score-pct" id="score-pct">—</span>
        <span class="score-label">Score</span>
      </div>
      <div class="score-breakdown">
        <div class="score-stat"><strong id="res-correct">0</strong> correct</div>
        <div class="score-stat"><strong id="res-total">0</strong> attempted</div>
        <div class="score-stat"><strong id="res-missed">0</strong> missed</div>
      </div>
    </div>

    <div class="results-card missed-section" id="missed-section" style="display:none; text-align:left;">
      <h3>Missed Questions</h3>
      <div id="missed-list"></div>
    </div>

    <div class="results-card" style="padding:20px;">
      <div class="results-actions">
        <button class="btn-retry-missed" id="btn-retry-missed" onclick="retryMissed()">Retry Missed</button>
        <button class="btn-new-session" onclick="newSession()">Start Over</button>
      </div>
    </div>

  </div>

</div><!-- /.app -->

<script>
/* ================================================================
   DATA – 24 professor-style questions (IDs 185–208)
================================================================ */
let ALL_QUESTIONS = [
  {
    "id": 185,
    "source": "Crowe et al. (2017)",
    "topic": "Agreeableness",
    "type": "mcq",
    "question": "[Comprehension] Crowe et al. (2017) argue that Agreeableness should be understood as a hierarchical construct with distinct facets beneath the broad domain. What is the primary theoretical justification for treating Agreeableness at the facet level rather than solely at the domain level?",
    "options": [
      "Facets of Agreeableness show divergent patterns of association with external criteria, indicating that the broad domain score obscures theoretically and practically meaningful distinctions among its components.",
      "Facets of Agreeableness are more heritable than the broad domain score, which means facet-level measurement captures genetic variance that domain scores systematically mask.",
      "The broad Agreeableness domain score is psychometrically unreliable, making facet-level scores the only valid way to assess this dimension of personality.",
      "Facet-level measurement is preferred because it produces shorter questionnaires that reduce respondent fatigue and improve data quality in large-scale survey studies."
    ],
    "answer": 0,
    "explanation": "The key argument for facet-level analysis is that Compassion, Politeness, and Morality (among others) predict different outcomes in different directions. A domain score averages across these, potentially canceling out real effects. Heritability, reliability, and questionnaire length are not the rationale Crowe et al. advance."
  },
  {
    "id": 186,
    "source": "Crowe et al. (2017)",
    "topic": "Agreeableness",
    "type": "mcq",
    "question": "[Application] Priya scores very high on the Compassion facet of Agreeableness but only moderately high on the Politeness facet. Based on Crowe et al.'s framework, which prediction about Priya's behavior is most consistent with the facet-level approach?",
    "options": [
      "Priya will show strong empathic responding and prosocial helping behavior, but may be less likely to defer to authority figures or suppress her opinions in social hierarchies.",
      "Priya's moderate Politeness score means her overall Agreeableness domain score will be low, and she will score poorly on measures of interpersonal warmth and cooperation.",
      "Priya will show uniformly high prosocial behavior across all interpersonal contexts because high Compassion is the most influential facet and overrides the effects of other facets.",
      "Priya's facet profile indicates a personality disorder because discrepancies between facets within the same domain are diagnostic of maladaptive personality functioning."
    ],
    "answer": 0,
    "explanation": "Crowe et al.'s framework predicts that facets have distinct criterion associations. Compassion is more strongly tied to empathy and helping; Politeness is tied to deference and norm compliance. Priya's profile predicts the former without necessarily the latter. Domain scores do not simply average in a way that makes high Compassion irrelevant."
  },
  {
    "id": 187,
    "source": "Crowe et al. (2017)",
    "topic": "Agreeableness",
    "type": "mcq",
    "question": "[Analysis] Crowe et al. find that some Agreeableness facets positively predict certain outcomes while other facets within the same domain negatively predict those same outcomes. What does this pattern of divergent validity imply for researchers who study prosocial behavior using only broad Agreeableness scores?",
    "options": [
      "Researchers using only domain scores risk finding null or weak effects not because Agreeableness is unimportant, but because opposing facet-level effects cancel out when aggregated, suppressing the true relationship.",
      "Researchers using only domain scores will consistently overestimate the effect of Agreeableness on prosocial behavior because broad scores capture more variance than any single facet can.",
      "Researchers using only domain scores will find that Agreeableness predicts prosocial behavior strongly, because aggregating across facets increases reliability and therefore increases observed validity coefficients.",
      "The divergent facet pattern means that Agreeableness is not a coherent psychological construct and should be split into multiple independent dimensions with no superordinate domain score."

  },
  {
    "id": 188,
    "source": "Crowe et al. (2017)",
    "topic": "Agreeableness",
    "type": "mcq",
    "question": "[Synthesis] Crowe et al.'s findings about Agreeableness facets parallel Stewart et al.'s argument about nuances and domains more broadly. What unified theoretical claim about personality measurement do both papers support?",
    "options": [
      "Both papers support the claim that personality measurement should be hierarchical and purposive: domain scores serve taxonomy and communication, but facets and narrower units are necessary when the research goal is predicting specific behavioral outcomes.",
      "Both papers conclude that broad personality domains like the Big Five are scientifically outdated frameworks that produce misleading results and should be fully replaced by item-level or facet-level measurement systems in all research contexts.",
      "Both papers demonstrate that the complexity of personality traits makes them fundamentally resistant to reliable self-report measurement, and that behavioral observation methods should systematically replace questionnaire-based assessment.",
      "Both papers argue that reporting any single summary score for personality is indefensible — the only scientifically credible approach is to present all levels of specificity simultaneously so readers can judge the relevant level for themselves."
    ],

    "explanation": "Both papers make a compatible hierarchical argument: domain scores provide parsimony and replicability for taxonomy, but when the goal is predicting specific outcomes, narrower units (facets or nuances) capture variance that is masked at the domain level. Neither paper argues for abandoning domains or self-report entirely."
  },
  {
    "id": 189,

    "type": "mcq",
    "question": "[Comprehension] In Cramer et al.'s network model of personality, what role do the nodes and edges of the network play, and how does this differ from the role of items and factors in a latent variable model?",
    "options": [
      "Nodes represent personality components (behaviors, cognitions, feelings) that directly cause one another through edges, whereas in a latent variable model items are passive reflections of a common underlying factor that causes them.",
      "Nodes represent latent personality factors that passively reflect underlying genetic variance, whereas edges represent the environmental pathways through which trait expression is shaped across situations.",
      "Nodes and edges in the network model serve the same explanatory function as factors and loadings in a latent variable model — both frameworks claim that correlations among items arise from a common underlying source.",
      "Nodes represent observed behaviors and edges represent heritability coefficients, making the network model a graphical representation of behavior genetic findings rather than a causal personality theory."
    ],
    "answer": 0,
    "explanation": "The network model's central claim is that personality components actively cause one another — e.g., not liking people causes you to avoid parties, which causes loneliness. In the latent variable model, the causal arrow runs from a hidden factor downward to items, which are passive indicators. These are fundamentally different causal structures, not just graphical variants of each other."
  },
  {
    "id": 190,
    "source": "Cramer et al. (2012)",
    "topic": "Network Theory",
    "type": "mcq",
    "question": "[Application] Jordan's therapist notices that his insomnia, irritability, and withdrawal from friends seem to reinforce each other in a self-sustaining cycle, making his anxiety worse even when the original stressor is gone. Which concept from Cramer et al.'s network framework best explains this pattern?",
    "options": [
      "The network has entered a stable attractor state in which mutually reinforcing nodes keep the system locked in a pathological configuration independent of the initial trigger.",
      "Jordan's pattern reflects a latent Neuroticism factor that has become activated by stress and is now expressing itself across multiple symptom domains simultaneously.",
      "The pattern illustrates that Jordan has low resilience as a trait, which is a stable individual difference in how quickly people return to baseline after a stressor is removed.",

    "answer": 0,

  {

    "options": [

  },

/* ================================================================
   STATE
================================================================ */
let opts        = { shuffleQ: true, shuffleA: true };
let queue       = [];   // ordered indices into ALL_QUESTIONS for this session
let current     = 0;    // index into queue
let answered    = false;
let score       = 0;
let attempted   = 0;
let missedIds   = [];   // question IDs that were answered wrong
let optionMap   = [];   // maps rendered button index → original option index (for shuffled answers)

/* ================================================================
   SETUP
================================================================ */
function toggleOpt(key) {
  opts[key] = !opts[key];
  document.getElementById(key === 'shuffleQ' ? 'btn-shuffle-q' : 'btn-shuffle-a')
    .classList.toggle('active', opts[key]);
}

function buildTopicOverview() {
  const seen = {};
  ALL_QUESTIONS.forEach(q => {
    if (!seen[q.topic]) seen[q.topic] = { src: q.source, count: 0 };
    seen[q.topic].count++;
  });
  const grid = document.getElementById('topic-overview');
  grid.innerHTML = Object.entries(seen).map(([topic, info]) => `
    <div class="topic-item">
      <div class="ti-name">${topic}</div>
      <div class="ti-src">${info.src.split('–')[0].trim()}</div>
      <div class="ti-count">${info.count} question${info.count > 1 ? 's' : ''}</div>
    </div>`).join('');
}

function startQuiz(questionIds) {
  // questionIds: optional array of IDs (for retry-missed)
  const pool = questionIds
    ? ALL_QUESTIONS.filter(q => questionIds.includes(q.id))
    : ALL_QUESTIONS.slice();

  queue = pool.map((_, i) => i < pool.length ? pool[i] : null).map((q, i) => i);
  // re-index: store questions in queue order
  window._activePool = pool;

  if (opts.shuffleQ) shuffle(queue);

  current  = 0;
  score    = 0;
  attempted = 0;
  missedIds = [];

  document.getElementById('setup-screen').style.display   = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display    = 'block';

  renderQuestion();
}

/* ================================================================
   RENDER
================================================================ */
function renderQuestion() {
  const q = window._activePool[queue[current]];
  answered = false;

  // Progress
  const total = queue.length;
  const pct   = Math.round((current / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('score-text').textContent    = `Score: ${score} / ${attempted}`;

  // Extract Bloom's tag from question text
  const bloomMatch = q.question.match(/^\[(\w+)\]\s*/);
  const bloomTag   = bloomMatch ? bloomMatch[1] : null;
  const qText      = q.question.replace(/^\[\w+\]\s*/, '');

  // Meta badges
  const bloomBadge = bloomTag
    ? `<span class="badge badge-bloom-${bloomTag.toLowerCase()}">${bloomTag}</span>`
    : '';
  document.getElementById('q-meta').innerHTML =
    bloomBadge +
    `<span class="badge badge-source">${q.source}</span>` +
    `<span class="badge badge-topic">${q.topic}</span>`;

  document.getElementById('q-text').textContent = qText;

  // Build option order
  const indices = q.options.map((_, i) => i);
  if (opts.shuffleA) shuffle(indices);
  optionMap = indices; // optionMap[buttonIdx] = originalOptionIdx

  const list = document.getElementById('options-list');
  list.innerHTML = indices.map((origIdx, btnIdx) => `
    <li>
      <button class="option-btn" data-btn="${btnIdx}" onclick="selectOption(${btnIdx})">
        <span style="font-weight:600;margin-right:8px;opacity:0.5">${btnIdx + 1}.</span>${q.options[origIdx]}
      </button>
    </li>`).join('');

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className     = 'feedback-box';
  fb.innerHTML     = '';

  // Next button
  const nb = document.getElementById('next-btn');
  nb.disabled = true;
  nb.textContent = (current + 1 < queue.length) ? 'Next \u2192 \u00A0Enter' : 'Finish \u2192 \u00A0Enter';
}

/* ================================================================
   INTERACTION
================================================================ */
function selectOption(btnIdx) {
  if (answered) return;
  answered = true;
  attempted++;

  const q       = window._activePool[queue[current]];
  const origIdx = optionMap[btnIdx];
  const correct = origIdx === q.answer;

  if (correct) score++;
  else         missedIds.push(q.id);

  // Style buttons
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    const orig = optionMap[i];
    if (orig === q.answer) btn.classList.add(correct ? 'correct' : 'reveal-correct');
    else if (i === btnIdx) btn.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'block';
  fb.className     = 'feedback-box ' + (correct ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML     = `<strong>${correct ? 'Correct' : 'Incorrect'}</strong>${q.explanation}`;

  // Score update
  document.getElementById('score-text').textContent = `Score: ${score} / ${attempted}`;

  // Next button
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  if (!answered) return;
  current++;
  if (current >= queue.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function finishEarly() {
  showResults();
}

/* ================================================================
   RESULTS
================================================================ */
function showResults() {
  document.getElementById('quiz-screen').style.display    = 'none';
  document.getElementById('results-screen').style.display = 'block';

  const pct = attempted > 0 ? Math.round((score / attempted) * 100) : 0;

  // Circle colour
  const circle = document.getElementById('score-circle');
  circle.className = 'score-circle ' + (pct >= 80 ? 'good' : pct >= 60 ? 'ok' : 'poor');
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-total').textContent   = attempted;
  document.getElementById('res-missed').textContent  = missedIds.length;

  // Missed list
  const ms = document.getElementById('missed-section');
  if (missedIds.length > 0) {
    ms.style.display = 'block';
    document.getElementById('missed-list').innerHTML = missedIds.map(id => {
      const q = ALL_QUESTIONS.find(x => x.id === id);
      const qText = q.question.replace(/^\[\w+\]\s*/, '');
      return `<div class="missed-item">
        <div class="mi-source">${q.source} — ${q.topic}</div>
        ${qText}
      </div>`;
    }).join('');
  } else {
    ms.style.display = 'none';
  }

  // Retry button
  document.getElementById('btn-retry-missed').disabled = missedIds.length === 0;
}

function retryMissed() {
  if (missedIds.length === 0) return;
  startQuiz(missedIds.slice());
}

function newSession() {
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display   = 'block';
}

/* ================================================================
   KEYBOARD SHORTCUTS
================================================================ */
document.addEventListener('keydown', e => {
  const qs = document.getElementById('quiz-screen');
  if (qs.style.display === 'none') return;

  if (!answered && e.key >= '1' && e.key <= '4') {
    const idx = parseInt(e.key) - 1;
    const buttons = document.querySelectorAll('.option-btn');
    if (buttons[idx]) selectOption(idx);
  }
  if (answered && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    nextQuestion();
  }
});

/* ================================================================
   UTILITIES
================================================================ */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ================================================================
   INIT
================================================================ */
buildTopicOverview();
</script>
